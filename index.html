<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>
<title>場所の英単語をおぼえよう</title>

<style>
:root{
  --bg1:#fff8df;
  --bg2:#eaf8ff;
  --card:#ffffff;
  --main:#ffb703;
  --accent:#fb8500;
  --sky:#8ecae6;
  --text:#263044;
  --muted:#607089;
  --line:#dcecf4;
}

*{
  box-sizing:border-box;
}

html,
body,
button{
  touch-action:manipulation;
}

body{
  margin:0;
  min-height:100vh;
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
  color:var(--text);
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Hiragino Sans",
    "Yu Gothic",
    sans-serif;
}

.app{
  position:relative;
  max-width:520px;
  margin:0 auto;
  padding:16px;
}

.header{
  position:relative;
  text-align:center;
  padding:8px 48px 14px;
}

.settings-open{
  position:absolute;
  top:2px;
  right:0;
  width:44px;
  height:44px;
  border:0;
  border-radius:50%;
  background:#edf6f9;
  font-size:22px;
  cursor:pointer;
}

.badge{
  display:inline-block;
  background:var(--main);
  border-radius:999px;
  padding:7px 14px;
  font-size:13px;
  font-weight:900;
}

h1{
  margin:10px 0 5px;
  font-size:26px;
}

.lead{
  margin:0;
  color:var(--muted);
  font-size:14px;
}

.progress-area{
  margin-bottom:12px;
}

.progress-text{
  display:flex;
  justify-content:space-between;
  margin-bottom:7px;
  font-weight:900;
}

.progress-bar{
  height:12px;
  overflow:hidden;
  background:#fff;
  border:2px solid var(--line);
  border-radius:999px;
}

.progress-fill{
  width:0%;
  height:100%;
  background:var(--main);
  border-radius:999px;
  transition:width .25s;
}

.card{
  min-height:430px;
  padding:24px 18px;
  background:var(--card);
  border:4px solid var(--main);
  border-radius:30px;
  box-shadow:0 8px 24px rgba(0,0,0,.09);

  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.icon{
  font-size:120px;
  line-height:1.1;
  margin-bottom:20px;
  user-select:none;
  cursor:pointer;
}

.english{
  font-size:38px;
  line-height:1.2;
  font-weight:900;
  color:#156082;
  overflow-wrap:anywhere;
  cursor:pointer;
}

.japanese{
  margin-top:12px;
  font-size:28px;
  font-weight:900;
}

.sound-btn{
  width:100%;
  max-width:330px;
  min-height:70px;
  margin-top:28px;
  border:0;
  border-radius:24px;
  background:var(--sky);
  color:var(--text);
  font-size:22px;
  font-weight:900;
  box-shadow:0 5px 0 #5f9fbd;
  cursor:pointer;
}

.sound-btn:active{
  transform:translateY(4px);
  box-shadow:0 1px 0 #5f9fbd;
}

.sound-btn.speaking{
  animation:pulse .7s infinite alternate;
}

.navigation{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:14px;
}

.nav-btn{
  min-height:58px;
  border:0;
  border-radius:20px;
  font-size:18px;
  font-weight:900;
  color:var(--text);
  cursor:pointer;
}

.prev-btn{
  background:#edf6f9;
}

.next-btn{
  background:var(--accent);
  color:#fff;
}

.nav-btn:active{
  transform:scale(.98);
}

.shuffle-btn{
  width:100%;
  min-height:50px;
  margin-top:12px;
  border:0;
  border-radius:18px;
  background:#fff;
  color:var(--muted);
  font-size:16px;
  font-weight:900;
  cursor:pointer;
}

.help{
  margin:18px 4px 0;
  padding:14px;
  background:rgba(255,255,255,.72);
  border-radius:18px;
  color:var(--muted);
  font-size:14px;
  line-height:1.7;
  text-align:center;
}

/* 設定画面の背景 */
.settings-overlay{
  display:none;
  position:fixed;
  inset:0;
  z-index:998;
  background:rgba(38,48,68,.35);
}

.settings-overlay.active{
  display:block;
}

/* 保護者向け設定 */
.settings-sheet{
  display:none;
  position:fixed;
  left:0;
  right:0;
  bottom:0;
  z-index:999;
  max-height:85vh;
  overflow-y:auto;
  padding:20px;
  background:#fff;
  border-radius:28px 28px 0 0;
  box-shadow:0 -8px 30px rgba(0,0,0,.2);
}

.settings-sheet.active{
  display:block;
}

.settings-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.settings-head h2{
  margin:0;
  font-size:22px;
}

.settings-close{
  width:40px;
  height:40px;
  border:0;
  border-radius:50%;
  background:#edf6f9;
  font-size:24px;
  font-weight:900;
  cursor:pointer;
}

.settings-description{
  margin:0 0 12px;
  color:var(--muted);
  font-size:14px;
  line-height:1.6;
}

.setting-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-bottom:14px;
}

.setting-actions button{
  min-height:46px;
  border:0;
  border-radius:16px;
  background:#edf6f9;
  color:var(--text);
  font-size:15px;
  font-weight:900;
  cursor:pointer;
}

.word-checks{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.word-check{
  display:flex;
  align-items:flex-start;
  gap:7px;
  min-height:60px;
  padding:10px;
  background:#fff8df;
  border:2px solid #f3d28a;
  border-radius:16px;
  font-size:14px;
  font-weight:900;
  cursor:pointer;
}

.word-check input{
  width:20px;
  height:20px;
  flex-shrink:0;
}

.setting-option{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:18px;
  padding:14px;
  background:#edf6f9;
  border-radius:16px;
  font-weight:900;
  cursor:pointer;
}

.setting-option input{
  width:22px;
  height:22px;
}

.save-settings{
  width:100%;
  min-height:56px;
  margin-top:18px;
  border:0;
  border-radius:18px;
  background:var(--main);
  color:var(--text);
  font-size:18px;
  font-weight:900;
  cursor:pointer;
}

.settings-error{
  min-height:22px;
  margin-top:10px;
  color:#e76f51;
  font-size:14px;
  font-weight:900;
  text-align:center;
}

@keyframes pulse{
  from{
    transform:scale(1);
  }
  to{
    transform:scale(1.04);
  }
}

.card-change{
  animation:cardChange .25s;
}

@keyframes cardChange{
  from{
    opacity:.25;
    transform:translateX(16px);
  }
  to{
    opacity:1;
    transform:translateX(0);
  }
}

@media (max-width:380px){
  .card{
    min-height:390px;
  }

  .icon{
    font-size:100px;
  }

  .english{
    font-size:32px;
  }

  .japanese{
    font-size:25px;
  }

  .word-checks{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>
<div class="app">

  <header class="header">
    <button
      id="settingsOpen"
      class="settings-open"
      type="button"
      aria-label="保護者向け設定を開く"
    >
      ⚙️
    </button>

    <span class="badge">英検Jr.向け</span>
    <h1>🏙️ 場所の英単語をおぼえよう</h1>
    <p class="lead">絵と音を見ながら、ゆっくり覚えよう</p>
  </header>

  <div class="progress-area">
    <div class="progress-text">
      <span id="counter">1 / 1</span>
      <span>⭐ おぼえるモード</span>
    </div>

    <div class="progress-bar">
      <div id="progressFill" class="progress-fill"></div>
    </div>
  </div>

  <main id="card" class="card">
    <div id="icon" class="icon">🍽️</div>
    <div id="english" class="english">restaurant</div>
    <div id="japanese" class="japanese">レストラン</div>

    <button id="soundBtn" class="sound-btn" type="button">
      🔊 restaurant
    </button>
  </main>

  <div class="navigation">
    <button id="prevBtn" class="nav-btn prev-btn" type="button">
      ◀ まえ
    </button>

    <button id="nextBtn" class="nav-btn next-btn" type="button">
      つぎ ▶
    </button>
  </div>

  <button id="shuffleBtn" class="shuffle-btn" type="button">
    🔀 順番をまぜる
  </button>

  <div class="help">
    イラストや「🔊」ボタンを押すと、英語をもう一度聞けます。<br>
    間違いも点数もないので、見るだけでも大丈夫です。
  </div>

</div>

<div id="settingsOverlay" class="settings-overlay"></div>

<section
  id="settingsSheet"
  class="settings-sheet"
  aria-label="保護者向け設定"
>
  <div class="settings-head">
    <h2>⚙️ 保護者向け設定</h2>

    <button
      id="settingsClose"
      class="settings-close"
      type="button"
      aria-label="設定を閉じる"
    >
      ×
    </button>
  </div>

  <p class="settings-description">
    お子さまに覚えてほしい単語を選んでください。
    設定はこのブラウザに保存されます。
  </p>

  <div class="setting-actions">
    <button id="selectAllBtn" type="button">
      すべて選択
    </button>

    <button id="clearAllBtn" type="button">
      すべて外す
    </button>
  </div>

  <div id="wordChecks" class="word-checks"></div>

  <label class="setting-option">
    <input id="autoSpeakCheck" type="checkbox" checked>
    「つぎ」へ進んだら英語を自動再生する
  </label>

  <button id="saveSettingsBtn" class="save-settings" type="button">
    保存してはじめる
  </button>

  <div id="settingsError" class="settings-error"></div>
</section>

<script>
const originalWords = [
  { icon:"🍽️", en:"restaurant", jp:"レストラン" },
  { icon:"🏪", en:"supermarket", jp:"スーパー" },
  { icon:"🏦", en:"bank", jp:"銀行" },
  { icon:"🏨", en:"hotel", jp:"ホテル" },
  { icon:"🏥", en:"hospital", jp:"病院" },
  { icon:"🏬", en:"store", jp:"店" },
  { icon:"🚏", en:"bus stop", jp:"バス停" },
  { icon:"✈️", en:"airport", jp:"空港" },
  { icon:"🚉", en:"station", jp:"駅" },
  { icon:"🛒", en:"market", jp:"市場" },
  { icon:"🏞️", en:"park", jp:"公園" },
  { icon:"🏠", en:"house", jp:"家" },
  { icon:"🏰", en:"castle", jp:"城" },
  { icon:"🌉", en:"bridge", jp:"橋" },
  { icon:"📚", en:"library", jp:"図書館" },
  { icon:"🏫", en:"school", jp:"学校" },
  { icon:"🎬", en:"movie theater", jp:"映画館" },
  { icon:"👮", en:"police station", jp:"警察署" },
  { icon:"📖", en:"bookstore", jp:"本屋" },
  { icon:"🏬", en:"department store", jp:"デパート" },
  { icon:"🖼️", en:"art museum", jp:"美術館" },
  { icon:"🏪", en:"convenience store", jp:"コンビニ" },
  { icon:"🚒", en:"fire station", jp:"消防署" },
  { icon:"🚆", en:"train station", jp:"鉄道の駅" }
];

const STORAGE_KEY = "placeWordCardSettings";

let words = originalWords.slice();
let currentIndex = 0;
let autoSpeak = true;

const $ = id => document.getElementById(id);

function shuffle(array){
  const copied = array.slice();

  for(let i = copied.length - 1; i > 0; i--){
    const randomIndex = Math.floor(Math.random() * (i + 1));

    [copied[i], copied[randomIndex]] =
      [copied[randomIndex], copied[i]];
  }

  return copied;
}

function renderCard(){
  if(words.length === 0){
    return;
  }

  if(currentIndex >= words.length){
    currentIndex = 0;
  }

  const current = words[currentIndex];

  $("icon").textContent = current.icon;
  $("english").textContent = current.en;
  $("japanese").textContent = current.jp;
  $("soundBtn").textContent = "🔊 " + current.en;

  $("counter").textContent =
    (currentIndex + 1) + " / " + words.length;

  $("progressFill").style.width =
    ((currentIndex + 1) / words.length * 100) + "%";

  $("prevBtn").disabled = currentIndex === 0;
  $("prevBtn").style.opacity =
    currentIndex === 0 ? ".45" : "1";

  if(currentIndex === words.length - 1){
    $("nextBtn").textContent = "最初にもどる ↻";
  }else{
    $("nextBtn").textContent = "つぎ ▶";
  }

  $("card").classList.remove("card-change");

  requestAnimationFrame(() => {
    $("card").classList.add("card-change");
  });
}

function getEnglishVoice(){
  const voices = speechSynthesis.getVoices();

  return (
    voices.find(voice => voice.name.includes("Samantha")) ||
    voices.find(voice => voice.name.includes("Karen")) ||
    voices.find(voice => voice.lang === "en-US") ||
    voices.find(voice => voice.lang.startsWith("en"))
  );
}

function speakCurrentWord(){
  if(!("speechSynthesis" in window)){
    alert("このブラウザは音声読み上げに対応していません。");
    return;
  }

  if(words.length === 0){
    return;
  }

  const current = words[currentIndex];

  speechSynthesis.cancel();

  const utterance =
    new SpeechSynthesisUtterance(current.en);

  utterance.lang = "en-US";
  utterance.rate = 0.78;
  utterance.pitch = 1.15;
  utterance.volume = 1;

  const voice = getEnglishVoice();

  if(voice){
    utterance.voice = voice;
  }

  utterance.onstart = () => {
    $("soundBtn").classList.add("speaking");
  };

  utterance.onend = () => {
    $("soundBtn").classList.remove("speaking");
  };

  utterance.onerror = () => {
    $("soundBtn").classList.remove("speaking");
  };

  speechSynthesis.speak(utterance);
}

function speakAfterMove(){
  if(!autoSpeak){
    return;
  }

  setTimeout(() => {
    speakCurrentWord();
  }, 200);
}

function showNext(){
  if(currentIndex < words.length - 1){
    currentIndex++;
  }else{
    currentIndex = 0;
  }

  renderCard();
  speakAfterMove();
}

function showPrevious(){
  if(currentIndex === 0){
    return;
  }

  currentIndex--;
  renderCard();
  speakAfterMove();
}

function buildSettings(){
  const savedSettings = loadSettings();
  const selectedIndexes = savedSettings.selectedIndexes;

  $("wordChecks").innerHTML = "";

  originalWords.forEach((word, index) => {
    const label = document.createElement("label");
    label.className = "word-check";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.className = "word-checkbox";
    checkbox.value = String(index);
    checkbox.checked = selectedIndexes.includes(index);

    const text = document.createElement("span");
    text.textContent =
      word.icon + " " + word.jp + " / " + word.en;

    label.appendChild(checkbox);
    label.appendChild(text);

    $("wordChecks").appendChild(label);
  });

  $("autoSpeakCheck").checked = savedSettings.autoSpeak;
}

function loadSettings(){
  const defaultSettings = {
    selectedIndexes:originalWords.map((_, index) => index),
    autoSpeak:true
  };

  try{
    const saved = localStorage.getItem(STORAGE_KEY);

    if(!saved){
      return defaultSettings;
    }

    const parsed = JSON.parse(saved);

    let selectedIndexes =
      Array.isArray(parsed.selectedIndexes)
        ? parsed.selectedIndexes.filter(index =>
            Number.isInteger(index) &&
            index >= 0 &&
            index < originalWords.length
          )
        : defaultSettings.selectedIndexes;

    if(selectedIndexes.length === 0){
      selectedIndexes = defaultSettings.selectedIndexes;
    }

    return {
      selectedIndexes,
      autoSpeak:parsed.autoSpeak !== false
    };
  }catch(error){
    return defaultSettings;
  }
}

function applySavedSettings(){
  const savedSettings = loadSettings();

  words = savedSettings.selectedIndexes
    .map(index => originalWords[index])
    .filter(Boolean);

  autoSpeak = savedSettings.autoSpeak;
  currentIndex = 0;

  renderCard();
}

function openSettings(){
  buildSettings();

  $("settingsError").textContent = "";
  $("settingsSheet").classList.add("active");
  $("settingsOverlay").classList.add("active");

  speechSynthesis.cancel();
}

function closeSettings(){
  $("settingsSheet").classList.remove("active");
  $("settingsOverlay").classList.remove("active");
}

$("soundBtn").onclick = speakCurrentWord;
$("icon").onclick = speakCurrentWord;
$("english").onclick = speakCurrentWord;

$("nextBtn").onclick = showNext;
$("prevBtn").onclick = showPrevious;

$("shuffleBtn").onclick = () => {
  words = shuffle(words);
  currentIndex = 0;

  renderCard();
  speakAfterMove();
};

$("settingsOpen").onclick = openSettings;
$("settingsClose").onclick = closeSettings;
$("settingsOverlay").onclick = closeSettings;

$("selectAllBtn").onclick = () => {
  document
    .querySelectorAll(".word-checkbox")
    .forEach(checkbox => {
      checkbox.checked = true;
    });

  $("settingsError").textContent = "";
};

$("clearAllBtn").onclick = () => {
  document
    .querySelectorAll(".word-checkbox")
    .forEach(checkbox => {
      checkbox.checked = false;
    });
};

$("saveSettingsBtn").onclick = () => {
  const selectedIndexes = Array
    .from(document.querySelectorAll(".word-checkbox:checked"))
    .map(checkbox => Number(checkbox.value));

  if(selectedIndexes.length === 0){
    $("settingsError").textContent =
      "最低1つは単語を選んでください。";
    return;
  }

  const settings = {
    selectedIndexes,
    autoSpeak:$("autoSpeakCheck").checked
  };

  try{
    localStorage.setItem(
      STORAGE_KEY,
      JSON.stringify(settings)
    );
  }catch(error){
    console.warn("設定を保存できませんでした。", error);
  }

  words = selectedIndexes
    .map(index => originalWords[index])
    .filter(Boolean);

  autoSpeak = settings.autoSpeak;
  currentIndex = 0;

  closeSettings();
  renderCard();

  if(autoSpeak){
    setTimeout(() => {
      speakCurrentWord();
    }, 300);
  }
};

if("speechSynthesis" in window){
  speechSynthesis.getVoices();

  speechSynthesis.onvoiceschanged = () => {
    speechSynthesis.getVoices();
  };
}

applySavedSettings();
</script>

</body>
</html>
